<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemoAgent — AI Chemistry Assistant</title>
    <meta name="description" content="Ask questions about chemistry, molecules, toxicity, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a1f35;
            --bg-input: #141929;
            --border: #2a3050;
            --border-focus: #6366f1;
            --text-primary: #e8eaf0;
            --text-secondary: #9ca3c0;
            --text-muted: #5b6280;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --accent-hover: #818cf8;
            --user-bg: #1e2444;
            --bot-bg: #141929;
            --success: #34d399;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ─────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            backdrop-filter: blur(12px);
            flex-shrink: 0;
        }

        .logo {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 10px;
            display: grid; place-items: center;
            font-size: 18px; font-weight: 700;
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header p {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            margin-left: auto;
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        /* ── Chat area ──────────────────────────── */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat-container::-webkit-scrollbar { width: 5px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .welcome {
            text-align: center;
            padding: 48px 20px;
            max-width: 480px;
            margin: auto;
        }

        .welcome-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .welcome h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 0.88rem;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }

        .suggestion {
            padding: 8px 16px;
            font-size: 0.78rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion:hover {
            border-color: var(--accent);
            color: var(--accent-hover);
            background: rgba(99, 102, 241, 0.08);
        }

        /* ── Message bubbles ────────────────────── */
        .msg {
            display: flex;
            gap: 12px;
            max-width: 780px;
            animation: fadeSlide 0.3s ease-out;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.bot  { align-self: flex-start; }

        .avatar {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: grid; place-items: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg.user .avatar {
            background: var(--user-bg);
            border: 1px solid var(--border);
        }

        .msg.bot .avatar {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .bubble {
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.65;
            font-size: 0.88rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.user .bubble {
            background: var(--user-bg);
            border: 1px solid var(--border);
            border-bottom-right-radius: 4px;
            color: var(--text-primary);
        }

        .msg.bot .bubble {
            background: var(--bot-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .bubble strong { color: var(--accent-hover); }
        .bubble code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82em;
            background: rgba(99, 102, 241, 0.1);
            padding: 2px 6px;
            border-radius: 5px;
        }

        /* ── Typing indicator ───────────────────── */
        .typing-dots {
            display: flex; gap: 5px; padding: 6px 0;
        }

        .typing-dots span {
            width: 7px; height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── Input bar ──────────────────────────── */
        #input-bar {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        #question {
            flex: 1;
            padding: 14px 18px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #question::placeholder { color: var(--text-muted); }

        #question:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #send-btn {
            width: 48px; height: 48px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            display: grid; place-items: center;
            transition: transform 0.15s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        #send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        #send-btn:active { transform: scale(0.95); }

        #send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .input-hint {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 8px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">⚗️</div>
    <div>
        <h1>ChemoAgent</h1>
        <p>AI Chemistry & Toxicity Assistant</p>
    </div>
    <div class="status-dot" title="Online"></div>
</header>

<div id="chat-container">
    <div class="welcome" id="welcome">
        <div class="welcome-icon">🧬</div>
        <h2>What would you like to know?</h2>
        <p>Ask about molecules, toxicity, green chemistry, SMILES analysis, or any chemoinformatics topic.</p>
        <div class="suggestions">
            <button class="suggestion" onclick="useSuggestion(this)">What is the toxicity of aspirin?</button>
            <button class="suggestion" onclick="useSuggestion(this)">Analyze SMILES: CCO</button>
            <button class="suggestion" onclick="useSuggestion(this)">What is LogP and why does it matter?</button>
        </div>
    </div>
</div>

<div id="input-bar">
    <div class="input-wrapper">
        <textarea id="question" rows="1" placeholder="Ask a chemistry question..." autocomplete="off"></textarea>
        <button id="send-btn" onclick="send()" title="Send">➤</button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const input = document.getElementById('question');
    const sendBtn = document.getElementById('send-btn');
    const welcome = document.getElementById('welcome');

    // Auto-resize textarea
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    function useSuggestion(btn) {
        input.value = btn.textContent;
        input.focus();
        send();
    }

    function addMessage(text, role) {
        if (welcome) welcome.remove();

        const msg = document.createElement('div');
        msg.className = `msg ${role}`;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? '👤' : '⚗️';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';

        // Basic markdown-like formatting
        let formatted = text
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/`(.+?)`/g, '<code>$1</code>')
            .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #2a3050;margin:10px 0">')
            .replace(/^• (.+)$/gm, '  • $1')
            .replace(/^- (.+)$/gm, '  - $1');

        bubble.innerHTML = formatted;

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        chatContainer.appendChild(msg);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        return msg;
    }

    function addTypingIndicator() {
        if (welcome) welcome.remove();

        const msg = document.createElement('div');
        msg.className = 'msg bot';
        msg.id = 'typing';

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '⚗️';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

        msg.appendChild(avatar);
        msg.appendChild(bubble);
        chatContainer.appendChild(msg);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTypingIndicator() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    async function send() {
        const question = input.value.trim();
        if (!question) return;

        input.value = '';
        input.style.height = 'auto';
        sendBtn.disabled = true;

        addMessage(question, 'user');
        addTypingIndicator();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question }),
            });

            if (!res.ok) throw new Error(`Server error: ${res.status}`);

            const data = await res.json();
            removeTypingIndicator();
            addMessage(data.answer, 'bot');
        } catch (err) {
            removeTypingIndicator();
            addMessage(`⚠️ Error: ${err.message}. Make sure the server is running.`, 'bot');
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    }
</script>

</body>
</html>
